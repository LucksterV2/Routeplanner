<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="10;url=https://nodanio.dk/RoutePlanner">
<title>Route Planner — Moved</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11;
    --panel: #16181c;
    --border: #2a2d33;
    --accent: #c8f060;
    --accent2: #60b8f0;
    --text: #e8eaed;
    --muted: #6b7280;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .icon { font-size: 40px; margin-bottom: 22px; display: block; }
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }
  p {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 32px;
  }
  p strong { color: var(--accent2); font-weight: 500; }
  .new-url {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    width: 100%;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.2px;
  }
  .new-url span { opacity: 0.45; font-size: 11px; }
  .go-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 9px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
    margin-bottom: 16px;
  }
  .go-btn:hover { opacity: 0.87; }
  .go-btn:active { opacity: 0.70; }
  .countdown {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .countdown strong { color: var(--text); }
  .divider { width: 100%; height: 1px; background: var(--border); margin: 28px 0; }
  .bookmark-tip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    text-align: center;
  }
  .bookmark-tip strong { color: var(--accent2); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <span class="icon">⚡</span>
  <div class="label">Route Planner · New address</div>
  <h1>We've moved!</h1>
  <p>This page has a <strong>new permanent home</strong>.<br>Your bookmarks and saved data are unaffected — just update the URL.</p>

  <div class="new-url">
    <span>→</span> nodanio.dk/RoutePlanner
  </div>

  <a class="go-btn" href="https://nodanio.dk/RoutePlanner">Go to new address →</a>

  <div class="countdown" id="countdown">Redirecting in <strong id="secs">10</strong>s…</div>

  <div class="divider"></div>

  <div class="bookmark-tip">
    If you have this page bookmarked, please update it to<br>
    <strong>nodanio.dk/RoutePlanner</strong>
  </div>
</div>

<script>
  let t = 10;
  const el = document.getElementById('secs');
  const iv = setInterval(() => {
    t--;
    el.textContent = t;
    if (t <= 0) {
      clearInterval(iv);
      document.getElementById('countdown').textContent = 'Redirecting…';
      window.location.href = 'https://nodanio.dk/RoutePlanner';
    }
  }, 1000);
</script>
</body>
</html>
